<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Top gloss -->
  <rect width="512" height="280" rx="112" fill="url(#gloss)"/>

  <!-- No-smoking circle -->
  <circle cx="256" cy="232" r="158" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="20" filter="url(#shadow)"/>

  <!-- Cigarette: tobacco body -->
  <rect x="106" y="218" width="148" height="28" rx="14" fill="rgba(255,238,210,0.95)"/>
  <!-- Cigarette: white paper wrap line -->
  <line x1="106" y1="232" x2="254" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Cigarette: filter (orange) -->
  <rect x="254" y="218" width="58" height="28" rx="4" fill="rgba(251,163,63,0.95)"/>
  <!-- Cigarette: filter stripe -->
  <rect x="262" y="218" width="7" height="28" fill="rgba(255,255,255,0.4)"/>
  <!-- Cigarette: tip -->
  <rect x="312" y="218" width="94" height="28" rx="8" fill="rgba(245,245,245,0.95)"/>

  <!-- Diagonal slash (red) -->
  <line x1="148" y1="96" x2="364" y2="368" stroke="#f87171" stroke-width="22" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- "戒烟" text -->
  <text x="256" y="448" text-anchor="middle"
    font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif"
    font-size="64" font-weight="800" fill="rgba(255,255,255,0.88)" letter-spacing="4">戒烟</text>
</svg>
